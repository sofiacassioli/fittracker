{% extends 'workout/base.html' %}

{% block content %}
<h2 class = "mb-4">{% if form.instance.pk %}Modifica obiettivo{% else %}Nuovo obiettivo{% endif %}</h2>

<form method = "post">
    {% csrf_token %}
    {% for field in form %}
        <div class = "mb-3">
            <label class = "form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <div class = "text-danger small">{{ field.errors }}</div>
            {% endif %}
        </div>
    {% endfor %}
    <button type = "submit" class = "btn btn-dark">Salva</button>
</form>
{% endblock %}
