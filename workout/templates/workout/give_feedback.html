{% extends 'workout/base.html' %}

{% block content %}
<h2>Feedback per {{ workout.title }}</h2>
<form method = "post">
    {% csrf_token %}
    <textarea name = "comment" class = "form-control mb-3" rows = "4" placeholder = "Scrivi un commento..."></textarea>
    <button type = "submit" class = "btn btn-dark">Invia feedback</button>
</form>
{% endblock %}
