{% extends 'workout/base.html' %}

{% block content %}

<!------ Pagina di accesso ------->
<div class = "row justify-content-center">
    <div class = "col-md-5">

        <h2 class = "mb-4">Accedi</h2>

        <!------- Messaggio di errore se le credenziali sono sbagliate ------>
        {% if error %}
            <div class = "alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method = "post">
            {% csrf_token %}
            <div class = "mb-3">
                <label class = "form-label">Username</label>
                <input type = "text" name = "username" class = "form-control" required>
            </div>
            <div class = "mb-3">
                <label class = "form-label">Password</label>
                <input type = "password" name = "password" class = "form-control" required>
            </div>
            <button type = "submit" class = "btn btn-dark w-100">Entra</button>
        </form>

        <!------ Link alla registrazione ------->
        <p class = "mt-3 text-center">
            Non hai un account? <a href = "{% url 'register' %}">Registrati</a>
        </p>

    </div>
</div>

{% endblock %}
