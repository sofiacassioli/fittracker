{% extends 'workout/base.html' %}

{% block content %}

<div class = "row justify-content-center">
    <div class = "col-md-6">

        <h2 class = "mb-4">Crea account</h2>

        <form method = "post">
            {% csrf_token %}

            <!----- Django genera automaticamente i campi del form ------>
            {% for field in form %}
                <div class = "mb-3">
                    <label class = "form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class = "text-danger small">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type = "submit" class = "btn btn-dark w-100">Registrati</button>
        </form>

        <p class = "mt-3 text-center">
            Hai già un account? <a href = "{% url 'login' %}">Accedi</a>
        </p>

    </div>
</div>

{% endblock %}
